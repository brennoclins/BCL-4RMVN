<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Player de Áudio Definitivo</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>
    
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #252525; padding: 30px; border-radius: 12px; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status { margin: 15px 0; font-size: 13px; color: #00d1ff; min-height: 18px; }
        input[type="file"] { width: 100%; margin-bottom: 20px; color: #ccc; }
        .btns { display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .play { background: #00c853; color: white; }
        .stop { background: #ff3d00; color: white; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <h3>MP3 & MIDI Player</h3>
    <input type="file" id="fileInput" accept=".mp3, .mid, .midi">
    <div id="status" class="status">Aguardando arquivo...</div>
    
    <div class="btns">
        <button id="playBtn" class="play" disabled>TOCAR</button>
        <button id="stopBtn" class="stop" disabled>PARAR</button>
    </div>
</div>

<script>
    const status = document.getElementById('status');
    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const fileInput = document.getElementById('fileInput');

    let audioPlayer = new Audio();
    let sampler = null;
    let midiData = null;
    let isMidi = false;
    let scheduledEvents = [];

    // Criar um sintetizador simples para o MIDI (Piano)
    // Usamos o Tone.js que é o padrão atual de áudio na Web
    sampler = new Tone.Sampler({
        urls: { A1: "A1.mp3", A2: "A2.mp3" },
        baseUrl: "https://tonejs.github.io/audio/salamander/",
        onload: () => { console.log("Sons carregados!"); }
    }).toDestination();

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        stopAll();
        const ext = file.name.split('.').pop().toLowerCase();
        
        if (ext === 'mp3') {
            isMidi = false;
            audioPlayer.src = URL.createObjectURL(file);
            status.innerText = "MP3 carregado.";
            playBtn.disabled = false;
            stopBtn.disabled = false;
        } 
        else if (ext === 'mid' || ext === 'midi') {
            isMidi = true;
            status.innerText = "Processando MIDI...";
            const arrayBuffer = await file.arrayBuffer();
            midiData = new Midi(arrayBuffer);
            status.innerText = "MIDI pronto!";
            playBtn.disabled = false;
            stopBtn.disabled = false;
        }
    };

    playBtn.onclick = async () => {
        // Importante: Iniciar o contexto de áudio após interação do usuário
        await Tone.start();

        if (isMidi) {
            status.innerText = "Tocando MIDI...";
            const now = Tone.now() + 0.5;
            midiData.tracks.forEach(track => {
                track.notes.forEach(note => {
                    let event = Tone.Transport.schedule((time) => {
                        sampler.triggerAttackRelease(note.name, note.duration, time, note.velocity);
                    }, note.time);
                    scheduledEvents.push(event);
                });
            });
            Tone.Transport.start();
        } else {
            status.innerText = "Tocando MP3...";
            audioPlayer.play();
        }
    };

    stopBtn.onclick = () => {
        stopAll();
        status.innerText = "Parado.";
    };

    function stopAll() {
        // Parar MP3
        audioPlayer.pause();
        audioPlayer.currentTime = 0;
        
        // Parar MIDI
        Tone.Transport.stop();
        Tone.Transport.cancel();
        scheduledEvents = [];
    }
</script>

</body>
</html>
